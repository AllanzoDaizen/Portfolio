name: Trigger Cloudflare Pages rebuild

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        run: curl --fail --silent --show-error -X POST "${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}"
