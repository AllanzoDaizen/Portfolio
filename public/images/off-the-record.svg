<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">OFF THE RECORD pwn writeup cover</title>
  <desc id="desc">Dark blue and dark pink cover art for a pwn format string writeup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071427"/>
      <stop offset="0.52" stop-color="#030b18"/>
      <stop offset="1" stop-color="#3b0b2a"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="60%">
      <stop offset="0" stop-color="#d9357d" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#d9357d" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#d9357d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d9357d" stroke-opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#glow)"/>
  <rect width="960" height="540" fill="url(#grid)" opacity="0.45"/>
  <rect x="48" y="46" width="864" height="448" fill="#030b18" fill-opacity="0.62" stroke="#d9357d" stroke-opacity="0.72"/>
  <path d="M86 138H874" stroke="#d9357d" stroke-opacity="0.45"/>
  <text x="86" y="106" fill="#ff9ab6" font-family="Nunito, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="8">PWN WRITEUP</text>
  <text x="86" y="234" fill="#edf4ff" font-family="Bungee, Impact, sans-serif" font-size="74" letter-spacing="-2">OFF THE</text>
  <text x="86" y="316" fill="#edf4ff" font-family="Bungee, Impact, sans-serif" font-size="74" letter-spacing="-2">RECORD</text>
  <text x="92" y="374" fill="#9daabe" font-family="Nunito, Arial, sans-serif" font-size="26" font-weight="800">format string · PIE leak · flag buffer read</text>
  <g transform="translate(650 180) rotate(-8)">
    <rect x="0" y="0" width="190" height="190" fill="none" stroke="#ff9ab6" stroke-opacity="0.6"/>
    <rect x="24" y="24" width="142" height="142" fill="none" stroke="#d9357d" stroke-opacity="0.55" stroke-dasharray="8 8"/>
    <text x="38" y="116" fill="#ff9ab6" font-family="Bungee, Impact, sans-serif" font-size="58">%S</text>
  </g>
  <rect x="86" y="422" width="236" height="46" fill="#d9357d" fill-opacity="0.18" stroke="#d9357d" stroke-opacity="0.65"/>
  <text x="108" y="453" fill="#ff9ab6" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="4">BOTNAS NOTES</text>
</svg>
